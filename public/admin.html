<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KiriPilot — Панель поддержки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#07080f;--surface:#0e1021;--surface2:#131629;--surface3:#191e38;
      --border:rgba(79,142,247,0.15);--border2:rgba(79,142,247,0.25);
      --accent:#4f8ef7;--accent2:#a78bfa;--success:#4ade80;--danger:#f87171;
      --warn:#fbbf24;--text:#e8eaf6;--muted:#6b7280;--glow:rgba(79,142,247,0.25);
    }
    html,body{height:100%}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;overflow:hidden}
    #login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
    .login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:40px 36px;box-shadow:0 0 0 1px rgba(79,142,247,0.06),0 24px 80px rgba(0,0,0,0.7),0 0 60px rgba(79,142,247,0.08)}
    .login-logo{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
    .login-subtitle{color:var(--muted);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:32px}
    .login-field{margin-bottom:14px}
    .login-label{display:block;font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
    .login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
    .login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,0.12)}
    .login-btn{width:100%;margin-top:8px;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.04em;border:none;border-radius:10px;cursor:pointer;transition:opacity 0.2s;box-shadow:0 0 24px var(--glow)}
    .login-btn:hover{opacity:0.9}
    .login-error{margin-top:10px;font-size:12px;color:var(--danger);text-align:center;min-height:18px}
    #admin-panel{display:none;height:100vh;flex-direction:column}
    .topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:10}
    .topbar-logo{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .topbar-sep{width:1px;height:20px;background:var(--border)}
    .topbar-label{font-size:12px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
    .topbar-spacer{flex:1}
    .colleagues{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
    .colleague-chip{background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.2);border-radius:100px;padding:3px 10px;font-size:11px;color:var(--accent);display:flex;align-items:center;gap:5px}
    .colleague-chip::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--success)}
    .my-badge{background:linear-gradient(135deg,rgba(79,142,247,0.15),rgba(167,139,250,0.15));border:1px solid rgba(79,142,247,0.25);border-radius:100px;padding:4px 12px;font-size:12px;color:var(--text);font-weight:500}
    .workspace{flex:1;display:flex;overflow:hidden;min-height:0}
    .sidebar{width:280px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .sidebar-header{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
    .sidebar-title{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
    .search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
    .search-input:focus{border-color:var(--accent)}
    .search-input::placeholder{color:var(--muted)}
    .user-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(79,142,247,0.2) transparent}
    .user-list::-webkit-scrollbar{width:3px}
    .user-list::-webkit-scrollbar-thumb{background:rgba(79,142,247,0.2);border-radius:2px}
    .user-item{padding:14px 16px;border-bottom:1px solid rgba(79,142,247,0.07);cursor:pointer;transition:background 0.15s;position:relative}
    .user-item:hover{background:rgba(79,142,247,0.05)}
    .user-item.active{background:rgba(79,142,247,0.1);border-left:2px solid var(--accent);padding-left:14px}
    .user-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .user-email{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
    .user-time{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}
    .user-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .unread-dot{position:absolute;right:14px;bottom:14px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}
    .empty-list{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
    .empty-list-text{font-size:13px;color:var(--muted);line-height:1.6}
    .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
    .chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--surface)}
    .chat-user-avatar{width:36px;height:36px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--accent);flex-shrink:0}
    .chat-user-email{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--text)}
    .chat-user-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:rgba(79,142,247,0.2) transparent}
    .chat-messages::-webkit-scrollbar{width:4px}
    .chat-messages::-webkit-scrollbar-thumb{background:rgba(79,142,247,0.2);border-radius:2px}
    .msg-row{display:flex;flex-direction:column;max-width:70%}
    .msg-row.from-user{align-self:flex-start;align-items:flex-start}
    .msg-row.from-admin{align-self:flex-end;align-items:flex-end}
    .msg-meta{font-size:10px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:6px}
    .admin-name-tag{background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.2);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--accent2);font-weight:500}
    .msg-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.55;word-break:break-word}
    .msg-row.from-user .msg-bubble{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
    .msg-row.from-admin .msg-bubble{background:linear-gradient(135deg,rgba(79,142,247,0.2),rgba(167,139,250,0.2));border:1px solid rgba(79,142,247,0.25);color:var(--text);border-bottom-right-radius:4px}
    .reply-area{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;background:var(--surface)}
    .reply-textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;resize:none;min-height:42px;max-height:120px;line-height:1.5;transition:border-color 0.2s}
    .reply-textarea:focus{border-color:var(--accent)}
    .reply-textarea::placeholder{color:var(--muted)}
    .reply-send-btn{height:42px;padding:0 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;border:none;border-radius:10px;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;box-shadow:0 0 16px var(--glow);flex-shrink:0}
    .reply-send-btn:hover{opacity:0.9}
    .reply-send-btn:disabled{opacity:0.4;cursor:not-allowed}
    .chat-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px;text-align:center}
    .chat-placeholder svg{width:56px;height:56px;stroke:var(--border2);fill:none}
    .chat-placeholder-title{font-family:'Space Grotesk',sans-serif;font-size:16px;color:var(--muted)}
    .chat-placeholder-desc{font-size:13px;color:rgba(107,114,128,0.6);max-width:260px;line-height:1.5}
    #toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,0.5);display:flex;align-items:center;gap:10px;animation:toast-in 0.3s ease forwards;max-width:320px}
    .toast.new-user{border-color:rgba(79,142,247,0.4)}
    @keyframes toast-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes toast-out{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">KiriPilot</div>
    <div class="login-subtitle">Панель поддержки</div>
    <div class="login-field">
      <label class="login-label" for="login-name">Ваше имя</label>
      <input id="login-name" class="login-input" type="text" placeholder="Например: Алексей" autocomplete="off"/>
    </div>
    <div class="login-field">
      <label class="login-label" for="login-token">Токен доступа</label>
      <input id="login-token" class="login-input" type="password" placeholder="••••••••••••" autocomplete="current-password"/>
    </div>
    <button id="login-btn" class="login-btn">Войти в панель</button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<div id="toast-container"></div>

<div id="admin-panel">
  <div class="topbar">
    <span class="topbar-logo">KiriPilot</span>
    <div class="topbar-sep"></div>
    <span class="topbar-label">Поддержка</span>
    <div class="topbar-spacer"></div>
    <div class="colleagues" id="colleagues-list"></div>
    <div class="my-badge" id="my-badge-label">…</div>
  </div>
  <div class="workspace">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Активные чаты <span id="chat-count" style="color:var(--accent)"></span></div>
        <input class="search-input" type="search" id="search-input" placeholder="Поиск по email…"/>
      </div>
      <div class="user-list" id="user-list">
        <div class="empty-list">
          <div class="empty-list-text">Ожидаем первых обращений…<br/>Пользователи появятся здесь после авторизации в чате.</div>
        </div>
      </div>
    </div>
    <div class="chat-area" id="chat-area">
      <div class="chat-placeholder" id="chat-placeholder">
        <svg viewBox="0 0 24 24" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <div class="chat-placeholder-title">Выберите диалог</div>
        <div class="chat-placeholder-desc">Нажмите на пользователя слева, чтобы открыть переписку</div>
      </div>
      <div id="active-chat" style="display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0;">
        <div class="chat-header" id="chat-header">
          <div class="chat-user-avatar" id="chat-avatar">?</div>
          <div>
            <div class="chat-user-email" id="chat-email">—</div>
            <div class="chat-user-meta" id="chat-meta">—</div>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="reply-area">
          <textarea class="reply-textarea" id="reply-input" placeholder="Ответить пользователю…" rows="1"></textarea>
          <button class="reply-send-btn" id="reply-send-btn">Отправить</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ИСПРАВЛЕНО: подключаемся к продакшн серверу -->
<script src="https://kiripilot.onrender.com/socket.io/socket.io.js"></script>

<script>
'use strict';

const BACKEND_URL = 'https://kiripilot.onrender.com';

const admin = {
  name: '',
  selectedSession: null,
  sessions: new Map(),
};

const loginScreen  = document.getElementById('login-screen');
const adminPanel   = document.getElementById('admin-panel');
const loginName    = document.getElementById('login-name');
const loginToken   = document.getElementById('login-token');
const loginBtn     = document.getElementById('login-btn');
const loginError   = document.getElementById('login-error');
const myBadge      = document.getElementById('my-badge-label');
const colleaguesList = document.getElementById('colleagues-list');
const chatCount    = document.getElementById('chat-count');
const searchInput  = document.getElementById('search-input');
const userList     = document.getElementById('user-list');
const chatPlaceholder = document.getElementById('chat-placeholder');
const activeChat   = document.getElementById('active-chat');
const chatAvatar   = document.getElementById('chat-avatar');
const chatEmail    = document.getElementById('chat-email');
const chatMeta     = document.getElementById('chat-meta');
const chatMessages = document.getElementById('chat-messages');
const replyInput   = document.getElementById('reply-input');
const replySendBtn = document.getElementById('reply-send-btn');
const toastContainer = document.getElementById('toast-container');

const socket = io(BACKEND_URL, { transports: ['websocket'] });

function doLogin() {
  const name  = loginName.value.trim();
  const token = loginToken.value.trim();
  if (!name)  { loginError.textContent = 'Введите ваше имя'; return; }
  if (!token) { loginError.textContent = 'Введите токен';    return; }
  loginError.textContent = '';
  loginBtn.disabled = true;
  loginBtn.textContent = 'Входим…';
  socket.emit('admin:login', { token, name });
}

loginBtn.addEventListener('click', doLogin);
loginToken.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

socket.on('admin:auth-success', ({ name, sessions }) => {
  admin.name = name;
  myBadge.textContent = name;
  loginScreen.style.display = 'none';
  adminPanel.style.display  = 'flex';
  adminPanel.style.flexDirection = 'column';
  sessions.forEach(s => {
    admin.sessions.set(s.sessionId, {
      email:    s.email,
      messages: [],
      unread:   s.messageCount > 0 ? 1 : 0,
      lastMsg:  s.lastMessage?.text || '',
      lastTime: s.lastMessage?.timestamp || s.createdAt,
    });
  });
  renderUserList();
});

socket.on('admin:auth-error', ({ message }) => {
  loginError.textContent = message;
  loginBtn.disabled = false;
  loginBtn.textContent = 'Войти в панель';
});

const colleagues = new Set();

socket.on('admin:colleague-joined', ({ name }) => {
  colleagues.add(name);
  renderColleagues();
  showToast(`👋 ${name} подключился к панели`, 'info');
});

socket.on('admin:colleague-left', ({ name }) => {
  colleagues.delete(name);
  renderColleagues();
});

function renderColleagues() {
  colleaguesList.innerHTML = [...colleagues].map(n =>
    `<div class="colleague-chip">${escapeHtml(n)}</div>`
  ).join('');
}

socket.on('admin:user-online', ({ sessionId, email, messageCount }) => {
  if (!admin.sessions.has(sessionId)) {
    admin.sessions.set(sessionId, { email, messages: [], unread: messageCount, lastMsg: '', lastTime: Date.now() });
    renderUserList();
    showToast(`💬 Новый пользователь: ${email}`, 'new-user');
  } else {
    const s = admin.sessions.get(sessionId);
    s.email = email;
    renderUserList();
  }
});

socket.on('admin:message', (msg) => {
  const s = admin.sessions.get(msg.sessionId);
  if (!s) return;
  s.messages.push(msg);
  s.lastMsg  = msg.text;
  s.lastTime = msg.timestamp;
  if (msg.from === 'user' && admin.selectedSession !== msg.sessionId) {
    s.unread = (s.unread || 0) + 1;
    showToast(`💬 ${s.email}: ${msg.text.substring(0, 60)}`, 'new-user');
  }
  if (admin.selectedSession === msg.sessionId) appendAdminMessage(msg);
  renderUserList();
});

socket.on('admin:history', ({ sessionId, email, messages }) => {
  const s = admin.sessions.get(sessionId);
  if (s) { s.messages = messages; s.email = email; }
  else admin.sessions.set(sessionId, { email, messages, unread: 0, lastMsg: '', lastTime: Date.now() });
  if (admin.selectedSession === sessionId) renderChatMessages(sessionId);
});

function renderUserList(filter = '') {
  chatCount.textContent = `(${admin.sessions.size})`;
  if (admin.sessions.size === 0) {
    userList.innerHTML = `<div class="empty-list"><div class="empty-list-text">Ожидаем первых обращений…</div></div>`;
    return;
  }
  const items = [...admin.sessions.entries()]
    .filter(([, s]) => !filter || s.email.includes(filter))
    .sort((a, b) => (b[1].lastTime || 0) - (a[1].lastTime || 0));
  userList.innerHTML = items.map(([sessionId, s]) => `
    <div class="user-item ${admin.selectedSession === sessionId ? 'active' : ''}"
         data-session="${escapeHtml(sessionId)}"
         onclick="openChat('${escapeHtml(sessionId)}')">
      <div class="user-item-header">
        <div class="user-email" title="${escapeHtml(s.email)}">${escapeHtml(s.email)}</div>
        <div class="user-time">${s.lastTime ? formatTime(s.lastTime) : ''}</div>
      </div>
      <div class="user-preview">${s.lastMsg ? escapeHtml(s.lastMsg.substring(0, 55)) : 'Нет сообщений'}</div>
      ${s.unread ? '<div class="unread-dot"></div>' : ''}
    </div>
  `).join('');
}

searchInput.addEventListener('input', (e) => renderUserList(e.target.value.toLowerCase().trim()));

function openChat(sessionId) {
  admin.selectedSession = sessionId;
  const s = admin.sessions.get(sessionId);
  if (!s) return;
  s.unread = 0;
  renderUserList(searchInput.value.toLowerCase().trim());
  chatPlaceholder.style.display = 'none';
  activeChat.style.display      = 'flex';
  chatAvatar.textContent        = s.email[0].toUpperCase();
  chatEmail.textContent         = s.email;
  chatMeta.textContent          = `Сессия активна • ${s.messages.length} сообщ.`;
  if (s.messages.length > 0) renderChatMessages(sessionId);
  else { chatMessages.innerHTML = ''; socket.emit('admin:get-history', { sessionId }); }
  replyInput.focus();
}

function renderChatMessages(sessionId) {
  const s = admin.sessions.get(sessionId);
  if (!s) return;
  chatMessages.innerHTML = '';
  s.messages.forEach(msg => appendAdminMessage(msg, false));
  scrollChatToBottom();
}

function appendAdminMessage(msg, scroll = true) {
  const isAdminMsg = msg.from === 'admin';
  const row = document.createElement('div');
  row.className = `msg-row ${isAdminMsg ? 'from-admin' : 'from-user'}`;
  const metaHtml = isAdminMsg
    ? `<span class="admin-name-tag">${escapeHtml(msg.adminName || 'Неизвестно')}</span> <span>${formatTime(msg.timestamp)}</span>`
    : `<span>Пользователь</span> <span>${formatTime(msg.timestamp)}</span>`;
  row.innerHTML = `<div class="msg-meta">${metaHtml}</div><div class="msg-bubble">${escapeHtml(msg.text)}</div>`;
  chatMessages.appendChild(row);
  if (scroll) scrollChatToBottom();
  const s = admin.sessions.get(admin.selectedSession);
  if (s) chatMeta.textContent = `Сессия активна • ${s.messages.length} сообщ.`;
}

function scrollChatToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }

function sendReply() {
  const text = replyInput.value.trim();
  if (!text || !admin.selectedSession) return;
  socket.emit('admin:reply', { sessionId: admin.selectedSession, text });
  replyInput.value = '';
  replyInput.style.height = 'auto';
}

replySendBtn.addEventListener('click', sendReply);
replyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); } });
replyInput.addEventListener('input', () => { replyInput.style.height = 'auto'; replyInput.style.height = replyInput.scrollHeight + 'px'; });

function showToast(text, type = '') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${escapeHtml(text)}</span>`;
  toastContainer.appendChild(toast);
  setTimeout(() => { toast.style.animation = 'toast-out 0.3s ease forwards'; setTimeout(() => toast.remove(), 300); }, 4000);
}

function formatTime(ts) { return new Date(ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }); }

function escapeHtml(str = '') {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\n/g,'<br/>');
}
</script>
</body>
</html>
