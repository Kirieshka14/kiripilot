<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>KiriPilot — Панель поддержки</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0b12;
      --surface:#12141f;
      --surface2:#1a1d2e;
      --surface3:#1e2135;
      --border:rgba(255,255,255,0.07);
      --border2:rgba(91,142,245,0.2);
      --accent:#5b8ef5;
      --accent2:#8b5cf6;
      --ok:#34d399;
      --err:#f87171;
      --warn:#fbbf24;
      --txt:#f0f1f8;
      --muted:#6b7280;
      --user-bubble:#1e2135;
      --admin-bubble:linear-gradient(135deg,rgba(91,142,245,0.18),rgba(139,92,246,0.18));
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }

    html,body{height:100%;overflow:hidden;background:var(--bg)}
    body{font-family:'Inter',sans-serif;color:var(--txt);display:flex;flex-direction:column}

    /* ── LOGIN ── */
    #login{
      position:fixed;inset:0;z-index:100;
      display:flex;align-items:center;justify-content:center;
      background:var(--bg);padding:1.5rem;
    }
    .login-card{
      width:100%;max-width:380px;
      background:var(--surface);
      border:1px solid var(--border2);
      border-radius:22px;padding:2.2rem 2rem;
      box-shadow:0 0 60px rgba(91,142,245,0.08),0 24px 60px rgba(0,0,0,0.6);
    }
    .login-logo{
      font-size:1.5rem;font-weight:700;letter-spacing:-0.03em;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:4px;
    }
    .login-sub{font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1.8rem}
    .login-field{margin-bottom:1rem}
    .login-label{display:block;font-size:0.7rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
    .login-inp{
      width:100%;background:var(--surface2);border:1.5px solid var(--border);
      border-radius:12px;padding:0.8rem 1rem;
      font-size:0.95rem;color:var(--txt);font-family:'Inter',sans-serif;outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    .login-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,142,245,0.12)}
    .login-btn{
      width:100%;margin-top:0.5rem;padding:0.85rem;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:600;
      border:none;border-radius:12px;cursor:pointer;
      transition:opacity .2s;box-shadow:0 4px 20px rgba(91,142,245,0.3);
    }
    .login-btn:hover{opacity:.9}
    .login-err{margin-top:0.6rem;font-size:0.75rem;color:var(--err);text-align:center;min-height:18px}

    /* ── MAIN PANEL ── */
    #panel{display:none;flex:1;flex-direction:column;height:100vh}
    #panel.on{display:flex}

    /* Topbar */
    .topbar{
      flex-shrink:0;height:54px;
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 1.2rem;gap:1rem;
    }
    .tb-logo{
      font-size:1.1rem;font-weight:700;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .tb-sep{width:1px;height:18px;background:var(--border)}
    .tb-label{font-size:0.7rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
    .tb-space{flex:1}
    .tb-badge{
      background:linear-gradient(135deg,rgba(91,142,245,0.15),rgba(139,92,246,0.15));
      border:1px solid var(--border2);border-radius:100px;
      padding:3px 12px;font-size:0.75rem;color:var(--txt);font-weight:500;
    }
    .colleagues{display:flex;gap:6px}
    .col-chip{
      background:rgba(91,142,245,0.1);border:1px solid rgba(91,142,245,0.2);
      border-radius:100px;padding:2px 10px;font-size:0.7rem;color:var(--accent);
      display:flex;align-items:center;gap:4px;
    }
    .col-chip::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ok)}

    /* Workspace */
    .workspace{flex:1;display:flex;overflow:hidden;min-height:0}

    /* Sidebar */
    .sidebar{
      width:260px;flex-shrink:0;
      background:var(--surface);border-right:1px solid var(--border);
      display:flex;flex-direction:column;overflow:hidden;
    }
    .sb-head{padding:14px;border-bottom:1px solid var(--border);flex-shrink:0}
    .sb-title{
      font-size:0.68rem;font-weight:600;letter-spacing:0.1em;
      text-transform:uppercase;color:var(--muted);margin-bottom:10px;
    }
    .sb-search{
      width:100%;background:var(--surface2);border:1.5px solid var(--border);
      border-radius:10px;padding:7px 11px;
      font-size:0.82rem;color:var(--txt);font-family:'Inter',sans-serif;outline:none;
      transition:border-color .2s;
    }
    .sb-search:focus{border-color:var(--accent)}
    .sb-search::placeholder{color:var(--muted)}

    .user-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(91,142,245,0.15) transparent}
    .user-list::-webkit-scrollbar{width:3px}
    .user-list::-webkit-scrollbar-thumb{background:rgba(91,142,245,0.15);border-radius:2px}

    .u-item{
      padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);
      cursor:pointer;transition:background .15s;position:relative;
    }
    .u-item:hover{background:rgba(91,142,245,0.05)}
    .u-item.active{background:rgba(91,142,245,0.1);border-left:2px solid var(--accent);padding-left:12px}
    .u-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
    .u-email{font-size:0.82rem;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:165px}
    .u-time{font-size:0.68rem;color:var(--muted);flex-shrink:0}
    .u-preview{font-size:0.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .u-unread{
      position:absolute;right:12px;bottom:12px;
      width:8px;height:8px;border-radius:50%;
      background:var(--accent);box-shadow:0 0 6px var(--accent);
    }
    .empty-sb{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:2rem;text-align:center;
    }
    .empty-sb p{font-size:0.8rem;color:var(--muted);line-height:1.6}

    /* Chat area */
    .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

    /* Chat header */
    .chat-head{
      flex-shrink:0;padding:12px 18px;
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:12px;
    }
    .chat-av{
      width:36px;height:36px;border-radius:50%;
      background:var(--surface3);border:1px solid var(--border2);
      display:flex;align-items:center;justify-content:center;
      font-size:0.9rem;font-weight:700;color:var(--accent);flex-shrink:0;
    }
    .chat-head-info{}
    .chat-head-email{font-size:0.9rem;font-weight:600}
    .chat-head-meta{font-size:0.7rem;color:var(--muted);margin-top:2px}

    /* Messages */
    .chat-msgs{
      flex:1;overflow-y:auto;
      padding:1.2rem 1.2rem;
      display:flex;flex-direction:column;gap:8px;
      scrollbar-width:thin;scrollbar-color:rgba(91,142,245,0.15) transparent;
    }
    .chat-msgs::-webkit-scrollbar{width:4px}
    .chat-msgs::-webkit-scrollbar-thumb{background:rgba(91,142,245,0.15);border-radius:2px}

    .msg-row{display:flex;flex-direction:column;max-width:72%}
    .msg-row.from-user{align-self:flex-start;align-items:flex-start}
    .msg-row.from-admin{align-self:flex-end;align-items:flex-end}

    .msg-meta{
      font-size:0.68rem;color:var(--muted);
      margin-bottom:3px;display:flex;align-items:center;gap:5px;
    }
    .admin-tag{
      background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.2);
      border-radius:4px;padding:1px 6px;font-size:0.68rem;color:var(--accent2);font-weight:500;
    }

    .msg-bubble{
      padding:9px 13px;border-radius:16px;
      font-size:0.85rem;line-height:1.55;word-break:break-word;
    }
    .msg-row.from-user .msg-bubble{
      background:var(--user-bubble);
      border:1px solid var(--border);color:var(--txt);
      border-bottom-left-radius:4px;
    }
    .msg-row.from-admin .msg-bubble{
      background:var(--admin-bubble);
      border:1px solid rgba(91,142,245,0.2);color:var(--txt);
      border-bottom-right-radius:4px;
    }
    .msg-time{font-size:0.65rem;color:var(--muted);margin-top:3px}

    /* Reply */
    .reply-area{
      flex-shrink:0;padding:12px 16px;
      padding-bottom:calc(12px + var(--safe-bottom));
      background:var(--surface);border-top:1px solid var(--border);
      display:flex;gap:8px;align-items:flex-end;
    }
    .reply-inp{
      flex:1;background:var(--surface2);border:1.5px solid var(--border);
      border-radius:18px;padding:9px 14px;
      font-size:0.85rem;color:var(--txt);font-family:'Inter',sans-serif;
      outline:none;resize:none;min-height:40px;max-height:110px;
      line-height:1.5;transition:border-color .2s;
    }
    .reply-inp:focus{border-color:rgba(91,142,245,0.4)}
    .reply-inp::placeholder{color:var(--muted)}
    .reply-send{
      height:40px;padding:0 18px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:600;
      border:none;border-radius:12px;cursor:pointer;
      white-space:nowrap;transition:opacity .2s;
      box-shadow:0 2px 12px rgba(91,142,245,0.3);flex-shrink:0;
    }
    .reply-send:hover{opacity:.9}
    .reply-send:disabled{opacity:.35;cursor:not-allowed}

    /* Placeholder */
    .chat-placeholder{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:10px;text-align:center;padding:2rem;
    }
    .chat-placeholder svg{width:52px;height:52px;stroke:var(--border2);fill:none;stroke-width:1.2}
    .ph-title{font-size:1rem;font-weight:600;color:var(--muted)}
    .ph-desc{font-size:0.78rem;color:rgba(107,114,128,0.6);max-width:220px;line-height:1.5}

    /* Toasts */
    #toasts{
      position:fixed;top:14px;right:14px;z-index:9999;
      display:flex;flex-direction:column;gap:6px;
    }
    .t-item{
      background:var(--surface);border:1px solid var(--border2);
      border-radius:12px;padding:10px 14px;
      font-size:0.8rem;color:var(--txt);
      box-shadow:0 6px 20px rgba(0,0,0,0.5);
      display:flex;align-items:center;gap:8px;
      animation:tin .3s ease forwards;max-width:300px;
    }
    @keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
    @keyframes tout{from{opacity:1}to{opacity:0;transform:translateX(16px)}}

    /* Mobile responsive */
    @media(max-width:600px){
      .sidebar{width:100%;position:fixed;inset:0;z-index:50;transform:translateX(0);transition:transform .3s}
      .sidebar.mob-closed{transform:translateX(-100%)}
      .chat-area{width:100%}
      .mob-back{display:flex!important}
    }
    .mob-back{
      display:none;background:none;border:none;cursor:pointer;
      color:var(--accent);font-size:0.82rem;font-family:'Inter',sans-serif;
      padding:0;align-items:center;gap:4px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">KiriPilot</div>
    <div class="login-sub">Панель поддержки</div>
    <div class="login-field">
      <label class="login-label">Ваше имя</label>
      <input id="l-name" class="login-inp" type="text" placeholder="Например: Алексей" autocomplete="off"/>
    </div>
    <div class="login-field">
      <label class="login-label">Токен доступа</label>
      <input id="l-token" class="login-inp" type="password" placeholder="••••••••••••"/>
    </div>
    <button id="l-btn" class="login-btn">Войти в панель</button>
    <div id="l-err" class="login-err"></div>
  </div>
</div>

<!-- TOASTS -->
<div id="toasts"></div>

<!-- PANEL -->
<div id="panel">
  <div class="topbar">
    <span class="tb-logo">KiriPilot</span>
    <div class="tb-sep"></div>
    <span class="tb-label">Поддержка</span>
    <div class="tb-space"></div>
    <div class="colleagues" id="colleagues"></div>
    <div class="tb-badge" id="my-name">…</div>
  </div>

  <div class="workspace">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sb-head">
        <div class="sb-title">Чаты <span id="chat-count" style="color:var(--accent)"></span></div>
        <input class="sb-search" id="sb-search" type="search" placeholder="Поиск по email…"/>
      </div>
      <div class="user-list" id="user-list">
        <div class="empty-sb"><p>Ожидаем первых обращений…<br/>Пользователи появятся здесь после авторизации.</p></div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
      <!-- Placeholder -->
      <div class="chat-placeholder" id="chat-ph">
        <svg viewBox="0 0 24 24" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <div class="ph-title">Выберите диалог</div>
        <div class="ph-desc">Нажмите на пользователя слева, чтобы открыть переписку</div>
      </div>

      <!-- Active chat -->
      <div id="active-chat" style="display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0">
        <div class="chat-head">
          <button class="mob-back" id="mob-back" onclick="closeMobChat()">← Назад</button>
          <div class="chat-av" id="chat-av">?</div>
          <div class="chat-head-info">
            <div class="chat-head-email" id="chat-email">—</div>
            <div class="chat-head-meta" id="chat-meta">—</div>
          </div>
        </div>
        <div class="chat-msgs" id="chat-msgs"></div>
        <div class="reply-area">
          <textarea class="reply-inp" id="reply-inp" placeholder="Ответить…" rows="1"></textarea>
          <button class="reply-send" id="reply-btn">Отправить</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';

const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });

// Heartbeat
let _ping;
socket.on('connect', () => {
  if (_ping) clearInterval(_ping);
  _ping = setInterval(() => { if (socket.connected) socket.emit('ping'); }, 25000);
});
socket.on('pong', () => {});

const adm = { name: '', sel: null, sessions: new Map() };

// ── DOM shortcuts ──
const $ = id => document.getElementById(id);

// ── Login ──
function doLogin() {
  const name  = $('l-name').value.trim();
  const token = $('l-token').value.trim();
  if (!name)  { $('l-err').textContent = 'Введите имя';   return; }
  if (!token) { $('l-err').textContent = 'Введите токен'; return; }
  $('l-err').textContent = '';
  $('l-btn').disabled = true;
  $('l-btn').textContent = 'Входим…';
  socket.emit('admin:login', { token, name });
}
$('l-btn').addEventListener('click', doLogin);
$('l-token').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

socket.on('admin:auth-success', ({ name, sessions }) => {
  adm.name = name;
  $('my-name').textContent = name;
  $('login').style.display = 'none';
  $('panel').classList.add('on');

  // На мобильном по умолчанию должен быть виден список чатов,
  // а не пустой плейсхолдер "Выберите диалог".
  if (window.innerWidth <= 600) {
    $('sidebar').classList.remove('mob-closed');
  }

  sessions.forEach(s => {
    adm.sessions.set(s.sessionId, {
      email:    s.email,
      messages: [],
      unread:   s.messageCount > 0 ? 1 : 0,
      lastMsg:  s.lastMessage?.text || '',
      lastTime: s.lastMessage?.timestamp || s.createdAt,
    });
  });
  renderList();
});

socket.on('admin:auth-error', ({ message }) => {
  $('l-err').textContent = message;
  $('l-btn').disabled = false;
  $('l-btn').textContent = 'Войти в панель';
});

// ── Colleagues ──
const cols = new Set();
socket.on('admin:colleague-joined', ({ name }) => {
  cols.add(name); renderCols();
  showToast(`👋 ${name} подключился`);
});
socket.on('admin:colleague-left', ({ name }) => {
  cols.delete(name); renderCols();
});
function renderCols() {
  $('colleagues').innerHTML = [...cols].map(n =>
    `<div class="col-chip">${esc(n)}</div>`
  ).join('');
}

// ── New user ──
socket.on('admin:user-online', ({ sessionId, email, messageCount }) => {
  if (!adm.sessions.has(sessionId)) {
    adm.sessions.set(sessionId, { email, messages: [], unread: messageCount, lastMsg: '', lastTime: Date.now() });
    renderList();
    showToast(`💬 ${email}`);
  } else {
    adm.sessions.get(sessionId).email = email;
    renderList();
  }
});

// ── Incoming message ──
socket.on('admin:message', msg => {
  const s = adm.sessions.get(msg.sessionId);
  if (!s) return;
  s.messages.push(msg);
  s.lastMsg  = msg.text;
  s.lastTime = msg.timestamp;
  if (msg.from === 'user' && adm.sel !== msg.sessionId) {
    s.unread = (s.unread || 0) + 1;
    showToast(`💬 ${s.email}: ${msg.text.substring(0, 50)}`);
  }
  if (adm.sel === msg.sessionId) appendMsg(msg);
  renderList();
});

// ── History ──
socket.on('admin:history', ({ sessionId, email, messages }) => {
  const s = adm.sessions.get(sessionId);
  if (s) { s.messages = messages; s.email = email; }
  else adm.sessions.set(sessionId, { email, messages, unread: 0, lastMsg: '', lastTime: Date.now() });
  if (adm.sel === sessionId) renderMsgs(sessionId);
});

// ── Render list ──
function renderList(filter = '') {
  $('chat-count').textContent = `(${adm.sessions.size})`;
  if (!adm.sessions.size) {
    $('user-list').innerHTML = '<div class="empty-sb"><p>Ожидаем первых обращений…</p></div>';
    return;
  }
  const items = [...adm.sessions.entries()]
    .filter(([, s]) => !filter || s.email.includes(filter))
    .sort((a, b) => (b[1].lastTime || 0) - (a[1].lastTime || 0));

  $('user-list').innerHTML = items.map(([sid, s]) => `
    <div class="u-item ${adm.sel === sid ? 'active' : ''}" onclick="openChat('${esc(sid)}')">
      <div class="u-row">
        <div class="u-email" title="${esc(s.email)}">${esc(s.email)}</div>
        <div class="u-time">${s.lastTime ? fmtTime(s.lastTime) : ''}</div>
      </div>
      <div class="u-preview">${s.lastMsg ? esc(s.lastMsg.slice(0, 50)) : 'Нет сообщений'}</div>
      ${s.unread ? '<div class="u-unread"></div>' : ''}
    </div>
  `).join('');
}
$('sb-search').addEventListener('input', e => renderList(e.target.value.toLowerCase().trim()));

// ── Open chat ──
function openChat(sid) {
  adm.sel = sid;
  const s = adm.sessions.get(sid);
  if (!s) return;
  s.unread = 0;
  renderList($('sb-search').value.toLowerCase().trim());

  $('chat-ph').style.display  = 'none';
  const ac = $('active-chat');
  ac.style.display = 'flex';

  $('chat-av').textContent    = s.email[0].toUpperCase();
  $('chat-email').textContent = s.email;
  $('chat-meta').textContent  = `${s.messages.length} сообщений`;

  if (s.messages.length) renderMsgs(sid);
  else { $('chat-msgs').innerHTML = ''; socket.emit('admin:get-history', { sessionId: sid }); }

  $('reply-inp').focus();

  // Mobile: скрываем список, показываем чат
  if (window.innerWidth <= 600) {
    $('sidebar').classList.add('mob-closed');
  }
}

function closeMobChat() {
  $('sidebar').classList.remove('mob-closed');
}

// ── Render messages ──
function renderMsgs(sid) {
  const s = adm.sessions.get(sid);
  if (!s) return;
  $('chat-msgs').innerHTML = '';
  s.messages.forEach(m => appendMsg(m, false));
  scrollBot();
  $('chat-meta').textContent = `${s.messages.length} сообщений`;
}

function appendMsg(msg, scroll = true) {
  const isAdm = msg.from === 'admin';
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isAdm ? 'from-admin' : 'from-user');
  const meta = isAdm
    ? `<span class="admin-tag">${esc(msg.adminName || 'Оператор')}</span><span>${fmtTime(msg.timestamp)}</span>`
    : `<span>Пользователь</span><span>${fmtTime(msg.timestamp)}</span>`;
  row.innerHTML = `
    <div class="msg-meta">${meta}</div>
    <div class="msg-bubble">${esc(msg.text)}</div>
  `;
  $('chat-msgs').appendChild(row);
  if (scroll) scrollBot();
  const s = adm.sessions.get(adm.sel);
  if (s) $('chat-meta').textContent = `${s.messages.length} сообщений`;
}

function scrollBot() {
  const m = $('chat-msgs');
  m.scrollTop = m.scrollHeight;
}

// ── Reply ──
function sendReply() {
  const text = $('reply-inp').value.trim();
  if (!text || !adm.sel) return;
  socket.emit('admin:reply', { sessionId: adm.sel, text });
  $('reply-inp').value = '';
  $('reply-inp').style.height = 'auto';
}
$('reply-btn').addEventListener('click', sendReply);
$('reply-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
});
$('reply-inp').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});

// ── Toasts ──
function showToast(text) {
  const t = document.createElement('div');
  t.className = 't-item';
  t.textContent = text;
  $('toasts').appendChild(t);
  setTimeout(() => {
    t.style.animation = 'tout .3s ease forwards';
    setTimeout(() => t.remove(), 300);
  }, 4000);
}

// ── Utils ──
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}
function esc(s = '') {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\n/g,'<br/>');
}
</script>
</body>
</html>
