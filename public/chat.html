<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Поддержка KiriPilot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0b12;
      --surface:#12141f;
      --surface2:#1a1d2e;
      --border:rgba(255,255,255,0.07);
      --accent:#5b8ef5;
      --accent2:#8b5cf6;
      --ok:#34d399;
      --err:#f87171;
      --txt:#f0f1f8;
      --muted:#6b7280;
      --user-bubble:linear-gradient(135deg,#5b8ef5,#8b5cf6);
      --admin-bubble:#1e2135;
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }

    html,body{height:100%;overflow:hidden;background:var(--bg)}
    body{font-family:'Inter',sans-serif;color:var(--txt);display:flex;flex-direction:column}

    /* ── AUTH SCREEN ── */
    #auth-screen{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:2rem 1.5rem;gap:0;
      background:var(--bg);
    }
    #auth-screen.hidden{display:none}

    .auth-logo{
      font-size:1.6rem;font-weight:700;letter-spacing:-0.03em;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:0.3rem;
    }
    .auth-tagline{font-size:0.78rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2.5rem}

    /* Steps */
    .auth-step{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:340px}
    .auth-step.hidden{display:none}

    .step-title{font-size:1.2rem;font-weight:600;text-align:center;margin-bottom:0.2rem}
    .step-desc{font-size:0.82rem;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:0.5rem}

    /* Email input */
    .email-inp{
      width:100%;background:var(--surface2);border:1.5px solid var(--border);
      border-radius:14px;padding:0.9rem 1.1rem;
      font-size:1rem;color:var(--txt);font-family:'Inter',sans-serif;outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    .email-inp::placeholder{color:var(--muted)}
    .email-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,142,245,0.15)}

    /* OTP boxes */
    .otp-row{
      display:flex;gap:8px;justify-content:center;
    }
    .otp-box{
      width:46px;height:56px;
      background:var(--surface2);border:1.5px solid var(--border);
      border-radius:12px;
      font-size:1.4rem;font-weight:700;text-align:center;
      color:var(--txt);font-family:'Inter',sans-serif;outline:none;
      caret-color:var(--accent);
      transition:border-color .15s,transform .15s,box-shadow .15s;
      -webkit-appearance:none;
    }
    .otp-box:focus,.otp-box.active{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(91,142,245,0.15);
      transform:translateY(-4px);
    }
    .otp-box.filled{border-color:rgba(91,142,245,0.4)}

    /* Primary button */
    .btn-primary{
      width:100%;padding:0.9rem;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;font-family:'Inter',sans-serif;font-size:1rem;font-weight:600;
      border:none;border-radius:14px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:opacity .2s,transform .15s;
      box-shadow:0 4px 24px rgba(91,142,245,0.3);
    }
    .btn-primary:active{opacity:.85;transform:scale(.98)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}

    .btn-ghost-sm{
      background:none;border:none;cursor:pointer;
      color:var(--muted);font-size:0.82rem;font-family:'Inter',sans-serif;
      text-align:center;transition:color .2s;padding:0.3rem;
    }
    .btn-ghost-sm:hover{color:var(--accent)}
    .btn-ghost-sm span{color:var(--accent);font-weight:600}

    .auth-err{font-size:0.78rem;color:var(--err);text-align:center;min-height:18px}

    .spin{
      width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;
      animation:spin .6s linear infinite;display:none;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── CHAT SCREEN ── */
    #chat-screen{
      flex:1;display:none;flex-direction:column;
      height:100%;overflow:hidden;
    }
    #chat-screen.active{display:flex}

    /* Header */
    .chat-top{
      flex-shrink:0;
      padding:1rem 1.2rem;
      padding-top:calc(1rem + env(safe-area-inset-top,0px));
      background:var(--surface);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:0.85rem;
    }
    .chat-top-av{
      width:38px;height:38px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 14px rgba(91,142,245,0.4);
    }
    .chat-top-av svg{width:18px;height:18px;fill:#fff}
    .chat-top-info{flex:1;min-width:0}
    .chat-top-name{font-size:0.95rem;font-weight:600}
    .chat-top-status{
      font-size:0.72rem;color:var(--muted);
      display:flex;align-items:center;gap:5px;margin-top:2px;
    }
    .status-dot{
      width:6px;height:6px;border-radius:50%;
      background:var(--ok);box-shadow:0 0 5px var(--ok);flex-shrink:0;
    }

    /* Messages */
    .chat-msgs{
      flex:1;overflow-y:auto;
      padding:1rem 1rem;
      display:flex;flex-direction:column;gap:6px;
      scroll-behavior:smooth;
    }
    .chat-msgs::-webkit-scrollbar{width:0}

    /* Date divider */
    .date-divider{
      text-align:center;font-size:0.7rem;color:var(--muted);
      margin:8px 0;letter-spacing:0.05em;
    }

    /* Message row */
    .msg{display:flex;flex-direction:column;max-width:78%}
    .msg.user{align-self:flex-end;align-items:flex-end}
    .msg.admin{align-self:flex-start;align-items:flex-start}

    .msg-sender{
      font-size:0.7rem;color:var(--muted);
      margin-bottom:3px;display:flex;align-items:center;gap:5px;
    }
    .sender-av{
      width:18px;height:18px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;align-items:center;justify-content:center;
    }
    .sender-av svg{width:9px;height:9px;fill:#fff}

    .msg-bubble{
      padding:10px 14px;border-radius:18px;
      font-size:0.92rem;line-height:1.5;word-break:break-word;
      position:relative;
    }
    .msg.user .msg-bubble{
      background:var(--user-bubble);color:#fff;
      border-bottom-right-radius:5px;
    }
    .msg.admin .msg-bubble{
      background:var(--admin-bubble);color:var(--txt);
      border:1px solid var(--border);
      border-bottom-left-radius:5px;
    }
    .msg-time{
      font-size:0.68rem;color:var(--muted);
      margin-top:3px;padding:0 2px;
    }

    /* Typing indicator */
    .typing-indicator{
      align-self:flex-start;
      background:var(--admin-bubble);border:1px solid var(--border);
      border-radius:18px;border-bottom-left-radius:5px;
      padding:10px 14px;display:none;align-items:center;gap:4px;
    }
    .typing-indicator.show{display:flex}
    .typing-dot{
      width:6px;height:6px;border-radius:50%;background:var(--muted);
      animation:tdot 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

    /* Input area */
    .chat-input-wrap{
      flex-shrink:0;
      padding:0.75rem 1rem;
      padding-bottom:calc(0.75rem + var(--safe-bottom));
      background:var(--surface);
      border-top:1px solid var(--border);
      display:flex;align-items:flex-end;gap:0.6rem;
    }
    .msg-textarea{
      flex:1;background:var(--surface2);border:1.5px solid var(--border);
      border-radius:22px;padding:0.65rem 1rem;
      font-size:0.92rem;color:var(--txt);font-family:'Inter',sans-serif;
      outline:none;resize:none;
      min-height:42px;max-height:100px;
      line-height:1.5;
      transition:border-color .2s;
    }
    .msg-textarea::placeholder{color:var(--muted)}
    .msg-textarea:focus{border-color:rgba(91,142,245,0.4)}

    .send-btn{
      width:42px;height:42px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:opacity .2s,transform .15s;
      box-shadow:0 2px 12px rgba(91,142,245,0.4);
    }
    .send-btn:active{opacity:.8;transform:scale(.92)}
    .send-btn svg{width:16px;height:16px;fill:#fff;margin-left:2px}

    /* Toast */
    #toast{
      position:fixed;bottom:calc(5rem + var(--safe-bottom));left:50%;
      transform:translateX(-50%) translateY(8px);
      background:var(--surface2);border:1px solid var(--border);
      border-radius:100px;padding:0.5rem 1.2rem;
      font-size:0.82rem;color:var(--txt);
      opacity:0;pointer-events:none;
      transition:opacity .25s,transform .25s;
      white-space:nowrap;z-index:999;
    }
    #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <div class="auth-logo">KiriPilot</div>
  <div class="auth-tagline">Поддержка</div>

  <!-- Step 1: Email -->
  <div class="auth-step" id="step-email">
    <div class="step-title">Войдите в чат</div>
    <div class="step-desc">Введите email — пришлём одноразовый код</div>
    <input class="email-inp" id="inp-email" type="email" placeholder="you@example.com"
           autocomplete="email" inputmode="email"/>
    <button class="btn-primary" id="btn-send-otp">
      <span class="spin" id="spin-email"></span>
      <span id="lbl-send">Получить код</span>
    </button>
    <div class="auth-err" id="err-email"></div>
  </div>

  <!-- Step 2: OTP -->
  <div class="auth-step hidden" id="step-otp">
    <div class="step-title">Введите код</div>
    <div class="step-desc" id="otp-desc">Код отправлен на ваш email</div>
    <div class="otp-row" id="otp-row">
      <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="0"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="1"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="2"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="3"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="4"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="5"/>
    </div>
    <button class="btn-primary" id="btn-verify">
      <span class="spin" id="spin-otp"></span>
      <span id="lbl-verify">Войти</span>
    </button>
    <div class="auth-err" id="err-otp"></div>
    <button class="btn-ghost-sm" onclick="resendOtp()">Не пришло? <span>Отправить снова</span></button>
    <button class="btn-ghost-sm" onclick="backToEmail()">← Изменить email</button>
  </div>
</div>

<!-- ── CHAT ── -->
<div id="chat-screen">
  <div class="chat-top">
    <div class="chat-top-av">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>
    <div class="chat-top-info">
      <div class="chat-top-name">Поддержка KiriPilot</div>
      <div class="chat-top-status">
        <span class="status-dot"></span>
        <span>Онлайн · отвечаем за 5 мин</span>
      </div>
    </div>
  </div>

  <div class="chat-msgs" id="chat-msgs">
    <div class="date-divider">Сегодня</div>
    <div class="msg admin">
      <div class="msg-sender">
        <div class="sender-av"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
        Поддержка KiriPilot
      </div>
      <div class="msg-bubble">👋 Привет! Опишите вопрос — ответим как можно скорее.</div>
      <div class="msg-time" id="welcome-time"></div>
    </div>
    <div class="typing-indicator" id="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="chat-input-wrap">
    <textarea class="msg-textarea" id="msg-inp" placeholder="Напишите сообщение…" rows="1"></textarea>
    <button class="send-btn" id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';

const S = {
  email:     localStorage.getItem('kp_email') || null,
  sessionId: localStorage.getItem('kp_sid')   || null,
  socket:    null,
  _ping:     null,
};

// ── Utils ──
const $ = id => document.getElementById(id);
let _tt;
function toast(m) {
  const t = $('toast');
  t.textContent = m;
  t.classList.add('on');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('on'), 3000);
}
function fmt(ts) {
  return new Date(ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br/>');
}
function scrollBot() {
  const m = $('chat-msgs');
  m.scrollTop = m.scrollHeight;
}

// ── Welcome time ──
$('welcome-time').textContent = fmt(Date.now());

// ── Socket ──
function connect() {
  if (S.socket) return;
  S.socket = io(window.location.origin, { transports: ['websocket', 'polling'] });

  S.socket.on('connect', () => {
    if (S._ping) clearInterval(S._ping);
    S._ping = setInterval(() => { if (S.socket?.connected) S.socket.emit('ping'); }, 25000);
  });
  S.socket.on('pong', () => {});

  S.socket.on('auth:otp-sent', () => {
    setEmailLoad(false);
    $('otp-desc').textContent = 'Код отправлен на ' + S.email;
    showStep('otp');
    focusOtp(0);
  });

  S.socket.on('auth:success', ({ sessionId, history }) => {
    S.sessionId = sessionId;
    localStorage.setItem('kp_sid', sessionId);
    localStorage.setItem('kp_email', S.email);
    setOtpLoad(false);
    showChat(history);
  });

  S.socket.on('auth:error', ({ message }) => {
    setEmailLoad(false);
    setOtpLoad(false);
    const onEmail = !$('step-email').classList.contains('hidden');
    if (onEmail) { $('err-email').textContent = message; }
    else         { $('err-otp').textContent   = message; }
  });

  S.socket.on('session:resumed', ({ history }) => {
    showChat(history);
  });

  S.socket.on('session:invalid', () => {
    localStorage.removeItem('kp_sid');
    localStorage.removeItem('kp_email');
    S.sessionId = null;
    showStep('email');
  });

  S.socket.on('chat:message', msg => {
    $('typing').classList.remove('show');
    appendMsg(msg);
    scrollBot();
  });
}

// ── Auth UI ──
function showStep(name) {
  $('step-email').classList.toggle('hidden', name !== 'email');
  $('step-otp').classList.toggle('hidden',   name !== 'otp');
  if (name === 'email') setTimeout(() => $('inp-email').focus(), 200);
}

function setEmailLoad(on) {
  $('spin-email').style.display = on ? 'block' : 'none';
  $('lbl-send').textContent     = on ? 'Отправляем…' : 'Получить код';
  $('btn-send-otp').disabled    = on;
}

function setOtpLoad(on) {
  $('spin-otp').style.display = on ? 'block' : 'none';
  $('lbl-verify').textContent = on ? 'Проверяем…' : 'Войти';
  $('btn-verify').disabled    = on;
}

function sendOtp() {
  const email = $('inp-email').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    $('err-email').textContent = 'Введите корректный email'; return;
  }
  S.email = email.toLowerCase();
  $('err-email').textContent = '';
  setEmailLoad(true);
  connect();
  S.socket.emit('auth:request-otp', { email: S.email });
}

function resendOtp() {
  $('err-otp').textContent = '';
  otpBoxes().forEach(b => { b.value = ''; b.classList.remove('filled'); });
  focusOtp(0);
  if (S.socket) S.socket.emit('auth:request-otp', { email: S.email });
  toast('Код отправлен повторно');
}

function backToEmail() { showStep('email'); }

function verify() {
  const code = otpBoxes().map(b => b.value).join('');
  if (code.length < 6) { $('err-otp').textContent = 'Введите все 6 цифр'; return; }
  $('err-otp').textContent = '';
  setOtpLoad(true);
  S.socket.emit('auth:verify-otp', { email: S.email, code });
}

// ── OTP boxes logic ──
function otpBoxes() { return Array.from(document.querySelectorAll('.otp-box')); }

function focusOtp(idx) {
  const boxes = otpBoxes();
  otpBoxes().forEach((b, i) => b.classList.toggle('active', i === idx));
  if (boxes[idx]) boxes[idx].focus();
}

otpBoxes().forEach((box, idx) => {
  box.addEventListener('focus', () => focusOtp(idx));
  box.addEventListener('input', e => {
    const val = e.target.value.replace(/\D/g, '');
    box.value = val ? val[val.length - 1] : '';
    box.classList.toggle('filled', !!box.value);
    if (box.value && idx < 5) focusOtp(idx + 1);
    const code = otpBoxes().map(b => b.value).join('');
    if (code.length === 6) setTimeout(verify, 80);
  });
  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !box.value && idx > 0) {
      focusOtp(idx - 1);
      otpBoxes()[idx - 1].value = '';
      otpBoxes()[idx - 1].classList.remove('filled');
    }
    if (e.key === 'Enter') verify();
  });
  box.addEventListener('paste', e => {
    e.preventDefault();
    const paste = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
    otpBoxes().forEach((b, i) => {
      b.value = paste[i] || '';
      b.classList.toggle('filled', !!b.value);
    });
    focusOtp(Math.min(paste.length, 5));
    if (paste.length === 6) setTimeout(verify, 80);
  });
});

// ── Chat UI ──
function showChat(history) {
  $('auth-screen').classList.add('hidden');
  const cs = $('chat-screen');
  cs.style.display = 'flex';
  cs.classList.add('active');
  if (history?.length) {
    history.forEach(m => appendMsg(m, false));
    scrollBot();
  }
  $('msg-inp').focus();
}

function appendMsg(msg, scroll = true) {
  const isAdmin = msg.from === 'admin' || msg.isAdmin;
  const div = document.createElement('div');
  div.className = 'msg ' + (isAdmin ? 'admin' : 'user');

  const senderHtml = isAdmin ? `
    <div class="msg-sender">
      <div class="sender-av"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
      ${esc(msg.adminName || 'Поддержка KiriPilot')}
    </div>` : '';

  div.innerHTML = `
    ${senderHtml}
    <div class="msg-bubble">${esc(msg.text)}</div>
    <div class="msg-time">${fmt(msg.timestamp)}</div>
  `;

  // Insert before typing indicator
  const typing = $('typing');
  $('chat-msgs').insertBefore(div, typing);
  if (scroll) scrollBot();
}

function sendMsg() {
  const text = $('msg-inp').value.trim();
  if (!text || !S.sessionId) return;
  S.socket.emit('user:message', { sessionId: S.sessionId, text });
  $('msg-inp').value = '';
  $('msg-inp').style.height = 'auto';
}

// ── Input handlers ──
$('btn-send-otp').addEventListener('click', sendOtp);
$('inp-email').addEventListener('keydown', e => { if (e.key === 'Enter') sendOtp(); });
$('btn-verify').addEventListener('click', verify);
$('send-btn').addEventListener('click', sendMsg);
$('msg-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
$('msg-inp').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ── Init ──
connect();
if (S.sessionId) {
  S.socket.on('connect', () => {
    S.socket.emit('session:resume', { sessionId: S.sessionId });
  });
} else {
  showStep('email');
}
</script>
</body>
</html>
