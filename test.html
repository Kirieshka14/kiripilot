<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:20px;font-size:18px">
<h2>Тест соединения с KiriPilot</h2>
<div id="status">Подключаюсь...</div>
<div id="log" style="margin-top:20px;white-space:pre-wrap"></div>

<script src="https://kiripilot.onrender.com/socket.io/socket.io.js"></script>
<script>
const log = document.getElementById('log');
const status = document.getElementById('status');
function add(msg){ log.textContent += msg + '\n'; console.log(msg); }

add('Создаю socket...');
const socket = io('https://kiripilot.onrender.com', { transports:['websocket','polling'] });

socket.on('connect', () => {
  status.textContent = '✅ ПОДКЛЮЧЕНО! id=' + socket.id;
  status.style.color = '#4ade80';
  add('connect событие сработало');
});

socket.on('connect_error', (err) => {
  status.textContent = '❌ ОШИБКА ПОДКЛЮЧЕНИЯ';
  status.style.color = '#f87171';
  add('connect_error: ' + err.message);
  add('тип: ' + err.type);
});

socket.on('disconnect', (reason) => {
  add('disconnect: ' + reason);
});

setTimeout(()=>{
  if(!socket.connected) add('Через 5 сек всё ещё НЕ подключено. socket.connected=' + socket.connected);
}, 5000);
</script>
</body>
</html>
